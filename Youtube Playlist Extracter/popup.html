<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: 'Malgun Gothic', sans-serif;
      text-align: center;
    }
    .options {
      margin: 15px 0;
      text-align: left;
      background: #f1f1f1;
      padding: 10px;
      border-radius: 5px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #ff0000;
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background-color: #cc0000;
    }
    button:disabled {
      background-color: #888;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <h3>🎵 곡 제목 추출기</h3>
  
  <div class="options">
    <strong>저장 형식 선택:</strong><br>
    <label><input type="radio" name="format" value="csv" checked> 엑셀 (CSV)</label><br>
    <label><input type="radio" name="format" value="txt"> 메모장 (TXT)</label>
  </div>

  <p style="font-size: 12px; color: gray;">추출 중에는 팝업창을 닫지 마세요!</p>
  <button id="extractBtn">추출 및 저장하기</button>
  
  <script src="popup.js"></script>
</body>
</html>
